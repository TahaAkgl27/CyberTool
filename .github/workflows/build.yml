name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore CyberTool.csproj

      - name: Build Release x64
        run: dotnet build CyberTool.csproj -c Release -p:Platform=x64 --no-restore

      - name: Check vulnerable packages
        run: dotnet list CyberTool.csproj package --vulnerable --include-transitive
        continue-on-error: true
